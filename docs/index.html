<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neon Heist</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07020f;
        --cyan: #19f6ff;
        --magenta: #ff2bd6;
        --orange: #ff8a1c;
        --text: #edfaff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(25, 246, 255, 0.12), transparent 34%),
          radial-gradient(circle at 76% 20%, rgba(255, 43, 214, 0.22), transparent 30%),
          var(--bg);
        color: var(--text);
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(48px, 10vw, 112px);
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
        text-shadow: 0 0 28px rgba(25, 246, 255, 0.45);
      }

      p {
        max-width: 660px;
        margin: 0 0 28px;
        font-size: clamp(18px, 2.6vw, 26px);
      }

      a {
        color: var(--cyan);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .chip {
        border: 1px solid rgba(25, 246, 255, 0.42);
        border-radius: 6px;
        padding: 8px 12px;
        color: #bffcff;
        background: rgba(3, 12, 22, 0.58);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Neon Heist</h1>
      <p>A cyberpunk roguelike infiltration prototype built in Godot 4.</p>
      <div class="meta">
        <span class="chip">Offline-first</span>
        <span class="chip">Procedural vaults</span>
        <span class="chip">Readable chaos</span>
      </div>
    </main>
  </body>
</html>
