<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dust Heist</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #130904;
        --sand: #e6b24a;
        --blood: #6f0805;
        --wood: #7a3d16;
        --text: #fff7e8;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          linear-gradient(180deg, rgba(230, 178, 74, 0.22), transparent 38%),
          radial-gradient(circle at 75% 18%, rgba(111, 8, 5, 0.28), transparent 28%),
          var(--bg);
        color: var(--text);
        font: 16px/1.5 Georgia, "Times New Roman", serif;
      }

      main {
        width: min(920px, calc(100% - 40px));
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(48px, 10vw, 112px);
        line-height: 0.9;
        letter-spacing: 0;
        text-transform: uppercase;
        text-shadow: 0 8px 0 rgba(0, 0, 0, 0.35);
      }

      p {
        max-width: 660px;
        margin: 0 0 28px;
        font-size: clamp(18px, 2.6vw, 26px);
      }

      a {
        color: var(--sand);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .chip {
        border: 1px solid rgba(230, 178, 74, 0.55);
        border-radius: 6px;
        padding: 8px 12px;
        color: #ffe0a2;
        background: rgba(60, 26, 9, 0.78);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dust Heist</h1>
      <p>A western courthouse survival game built in Godot 4, with saber strikes, revolver skills, outlaw waves, and bloody sand.</p>
      <div class="meta">
        <span class="chip">One-hit duels</span>
        <span class="chip">Western waves</span>
        <span class="chip">Swords and revolvers</span>
      </div>
    </main>
  </body>
</html>
